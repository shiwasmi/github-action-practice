name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:

env:
  APP_NAME: github-action-practice
  VERSION: 1.1.${{ github.run_number }}

  IMAGE_TAG: ${{ github.run_number }}

  IMAGE_LOCAL: github-action-practice:${{ github.run_number }}
  IMAGE_LOCAL_LATEST: github-action-practice:latest

  IMAGE_DOCKERHUB: sagarchattar/github-action-practice:${{ github.run_number }}
  IMAGE_DOCKERHUB_LATEST: sagarchattar/github-action-practice:latest

  IMAGE_ECR: 251335054837.dkr.ecr.ap-south-1.amazonaws.com/github-action-practice:${{ github.run_number }}
  IMAGE_ECR_LATEST: 251335054837.dkr.ecr.ap-south-1.amazonaws.com/github-action-practice:latest

jobs:

  build-test:
    name: Build, Test & Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 21 with Maven
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: maven   # handles Maven installation & caching automatically

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Package Artifact
        run: mvn package -DskipTests

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar


  docker-build-scan-push:
    name: Docker Build, Scan & Push
    runs-on: self-hosted
    needs: build-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Verify downloaded artifact
        run: ls -l target

      - name: Build Docker Image
        run: |
          docker build -t $IMAGE_LOCAL .
          docker tag $IMAGE_LOCAL $IMAGE_LOCAL_LATEST
          docker tag $IMAGE_LOCAL $IMAGE_DOCKERHUB
          docker tag $IMAGE_LOCAL $IMAGE_DOCKERHUB_LATEST
          docker tag $IMAGE_LOCAL $IMAGE_ECR
          docker tag $IMAGE_LOCAL $IMAGE_ECR_LATEST

      # Optional: enable Trivy scan once version is confirmed
      # - name: Scan Docker Image with Trivy
      #   uses: aquasecurity/trivy-action@v0.36.0
      #   with:
      #     image-ref: ${{ env.IMAGE_LOCAL }}
      #     exit-code: '0'
      #     severity: 'CRITICAL,HIGH'

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Push to Docker Hub
        run: |
          docker push $IMAGE_DOCKERHUB
          docker push $IMAGE_DOCKERHUB_LATEST

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin 251335054837.dkr.ecr.ap-south-1.amazonaws.com

      - name: Push to Amazon ECR
        run: |
          docker push $IMAGE_ECR
          docker push $IMAGE_ECR_LATEST

      - name: Cleanup Docker Images
        if: always()
        run: |
          docker rmi $IMAGE_LOCAL || true
          docker rmi $IMAGE_LOCAL_LATEST || true
          docker rmi $IMAGE_DOCKERHUB || true
          docker rmi $IMAGE_DOCKERHUB_LATEST || true
          docker rmi $IMAGE_ECR || true
          docker rmi $IMAGE_ECR_LATEST || true
          docker image prune -f || true
